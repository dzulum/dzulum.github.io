<!-- Html Elements for Search -->
<h1 class="top">BUSCADOR</h1>

<div id="search-container">
    <i class="fas fa-terminal" style="position: absolute; left: -30px; top: 15px; color: var(--cyan-neon);"></i>
    <input type="text" id="search-input" placeholder="Iniciando escaneo de base de datos...">
    <ul id="results-container"></ul>
</div>
<!-- Script pointing to search-script.js -->
<script src="{{ site.baseurl }}/js/search.js" type="text/javascript"></script>

<!-- Configuration -->
<script>
SimpleJekyllSearch({
  searchInput: document.getElementById('search-input'),
  resultsContainer: document.getElementById('results-container'),
  json: '{{ site.baseurl }}/search.json'
})
</script>
